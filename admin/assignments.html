<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0d0f12">
  <title>Assign Workouts — Fitness Park Admin</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <div class="page" id="app">
    <div class="loading-screen"><div class="spinner"></div><p>Loading...</p></div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/db.js"></script>
  <script src="../js/ui.js"></script>
  <script>
    const app = document.getElementById("app");
    let profile = null;
    let users = [];
    let workouts = [];
    let selectedUserId = new URLSearchParams(window.location.search).get("user") || "";
    let schedule = {};

    function workoutOptions(selectedId = "") {
      return `<option value="">— Rest / None —</option>` +
        workouts.map((w) =>
          `<option value="${w.id}"${w.id === selectedId ? " selected" : ""}>${escapeHtml(w.name)} (${getWorkoutTypeLabel(w.type)}, ${getFocusLabel(w.focus)})</option>`
        ).join("");
    }

    function renderDayAssignments() {
      const container = document.getElementById("day-assignments");
      container.innerHTML = DAYS.map((day) => `
        <div class="form-group">
          <label class="form-label">${day.full}</label>
          <select class="form-select" data-day="${day.id}">${workoutOptions(schedule[day.id] || "")}</select>
        </div>
      `).join("");
    }

    async function loadSchedule() {
      if (!selectedUserId) {
        schedule = {};
        return;
      }
      schedule = await getUserSchedule(selectedUserId);
    }

    requireAdmin().then(async (result) => {
      if (!result) return;
      profile = result.profile;
      users = await getMemberUsers();
      workouts = await getAllWorkouts();

      if (!selectedUserId && users.length) selectedUserId = users[0].id;
      await loadSchedule();

      app.innerHTML = `
        <div class="admin-header">
          <div>
            <div class="header__title">Assign Workouts</div>
            <p class="header__subtitle">Set weekly plan per member</p>
          </div>
        </div>
        <a href="index.html" class="btn btn--secondary" style="width:100%;margin-bottom:12px">← Admin home</a>

        <div class="form-group">
          <label class="form-label" for="user-select">Select member</label>
          <select class="form-select" id="user-select">
            ${users.map((u) => `<option value="${u.id}"${u.id === selectedUserId ? " selected" : ""}>${escapeHtml(u.name)} (${escapeHtml(u.phone)})</option>`).join("")}
          </select>
        </div>

        <div class="section-title">Monday – Saturday</div>
        <div id="day-assignments"></div>

        <div id="save-status"></div>
        <button class="btn btn--primary" id="save-btn" style="margin-top:12px">Save assignments</button>
      `;

      renderDayAssignments();

      document.getElementById("user-select").addEventListener("change", async (e) => {
        selectedUserId = e.target.value;
        await loadSchedule();
        renderDayAssignments();
      });

      document.getElementById("save-btn").addEventListener("click", async () => {
        if (!selectedUserId) return;
        const days = {};
        document.querySelectorAll("[data-day]").forEach((select) => {
          if (select.value) days[select.dataset.day] = select.value;
        });
        await saveUserFullSchedule(selectedUserId, days);
        const status = document.getElementById("save-status");
        status.innerHTML = `<div class="alert alert--success">Assignments saved!</div>`;
        setTimeout(() => { status.innerHTML = ""; }, 2500);
      });

      mountBottomNav("admin", profile);
    });
  </script>
</body>
</html>
