<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0d0f12">
  <title>Today's Workout — Fitness Park</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="page" id="app">
    <div class="loading-screen">
      <div class="spinner"></div>
      <p>Loading workout...</p>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/db.js"></script>
  <script src="js/ui.js"></script>
  <script>
    const app = document.getElementById("app");

    async function render(profile) {
      const todayId = getTodayDayId();
      const dayInfo = todayId ? getDayInfo(todayId) : null;

      if (!todayId) {
        app.innerHTML = `
          <header class="header">
            <div class="header__greeting">Hey, ${escapeHtml(profile.name || "there")} 👋</div>
            <p class="header__subtitle">Take it easy today</p>
          </header>
          <div class="card rest-day">
            <div class="rest-day__icon">🧘</div>
            <div class="rest-day__title">Rest Day</div>
            <p class="card__meta">Sunday is your recovery day. See you Monday!</p>
          </div>
          <a href="week.html" class="btn btn--secondary" style="width:100%;margin-top:12px">View weekly plan</a>
        `;
        mountBottomNav("home", profile);
        return;
      }

      const workout = await getUserWorkoutForDay(profile.uid, todayId);
      const count = workout.exercises.length;

      app.innerHTML = `
        <header class="header">
          <div class="header__greeting">Hey, ${escapeHtml(profile.name || "there")} 👋</div>
          <p class="header__subtitle">${dayInfo.full} · Today</p>
        </header>

        <div class="card card--highlight">
          <div class="card__title">${escapeHtml(workout.title)}</div>
          <div class="card__meta">${count} exercise${count !== 1 ? "s" : ""} scheduled</div>
          ${renderWorkoutMeta(workout)}
        </div>

        <div class="card" id="exercise-list-card"></div>
      `;

      mountExerciseList(
        document.getElementById("exercise-list-card"),
        renderExerciseList(workout.exercises, "No workout assigned for today. Contact your trainer.", workout.type || "weight")
      );

      mountBottomNav("home", profile);
    }

    requireAuth().then(async ({ profile }) => {
      try {
        await render(profile);
      } catch (err) {
        app.innerHTML = `<div class="alert alert--error">${escapeHtml(err.message)}</div>`;
      }
    });
  </script>
</body>
</html>
